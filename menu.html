<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Krabby Patty</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color:#f4f4f4;
    margin:0;
}

header{
    background:#ffcc00;
    text-align:center;
    padding:20px;
}

h1{
    color:#333;
}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}

.menu{
    background:white;
    width:250px;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    text-align:center;
    padding:15px;
}

.menu img{
    width:100%;
    border-radius:10px;
}

.price{
    color:green;
    font-weight:bold;
    margin:10px 0;
}

button{
    background:#ffcc00;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#ff9900;
}
</style>

</head>
<body>

<header>
<h1>🍔 Menu Krabby Patty 🦀</h1>
<p>Restoran Bikini Bottom</p>
</header>

<div class="container">

<div class="menu">
<img src="https://via.placeholder.com/250" alt="Krabby Patty Original">
<h3>Krabby Patty Original</h3>
<p class="price">Rp 25.000</p>
<button>Pesan</button>
</div>

<div class="menu">
<img src="https://via.placeholder.com/250" alt="Double Krabby Patty">
<h3>Double Krabby Patty</h3>
<p class="price">Rp 35.000</p>
<button>Pesan</button>
</div>

<div class="menu">
<img src="https://via.placeholder.com/250" alt="Cheese Krabby Patty">
<h3>Cheese Krabby Patty</h3>
<p class="price">Rp 30.000</p>
<button>Pesan</button>
</div>

</div>

</body>
</html>
